---
name: Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: read

env:
  UV_VERSION: "0.11.8"

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # actions/checkout v7.0.0
        uses: >-
          actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        # astral-sh/setup-uv v8.2.0
        uses: >-
          astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-suffix: release

      - name: Install Python
        run: uv python install 3.13

      - name: Install project
        run: uv sync --locked --dev --python 3.13

      - name: Run release checks
        run: |
          uv run --python 3.13 ruff format --check .
          uv run --python 3.13 ruff check --output-format=github .
          uv run --python 3.13 mypy src tests
          uv run --python 3.13 pytest -q --tb=short

      - name: Build distributions
        run: uv build

      - name: Verify distribution metadata
        run: uv run --python 3.13 twine check dist/*

      - name: Upload distributions
        # actions/upload-artifact v7.0.1
        uses: >-
          actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: distributions
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download distributions
        # actions/download-artifact v8.0.1
        uses: >-
          actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: distributions
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: >-
          gh release create "$RELEASE_TAG" dist/*
          --repo "$GITHUB_REPOSITORY"
          --generate-notes
          --verify-tag

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: vars.PYPI_PUBLISH_ENABLED == 'true'
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        # actions/download-artifact v8.0.1
        uses: >-
          actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: distributions
          path: dist

      - name: Publish to PyPI
        # pypa/gh-action-pypi-publish v1.14.0
        uses: >-
          pypa/gh-action-pypi-publish@6733eb7d741f0b11ec6a39b58540dab7590f9b7d
