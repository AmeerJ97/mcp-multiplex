---
name: CodeQL

"on":
  push:
    branches: [main]
  schedule:
    - cron: "31 7 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # actions/checkout v7.0.0
        uses: >-
          actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Initialize CodeQL
        # github/codeql-action v4.36.2
        uses: >-
          github/codeql-action/init@1a818fd5f97ed0ee9a823421bd5b171add01227f
        with:
          languages: python

      - name: Perform CodeQL analysis
        # github/codeql-action v4.36.2
        uses: >-
          github/codeql-action/analyze@1a818fd5f97ed0ee9a823421bd5b171add01227f
